name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - deploy-to-aws-eb
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    # - name: Build with Maven
    #   run: mvn clean package -DskipTests
    
    - name: Build with Gradle
      working-directory: ./AddressVerifier
      run: ./gradlew clean build
    
    - name: Configure Elastic Beanstalk Environment Variables
      run: |
        aws elasticbeanstalk update-environment \
          --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
          --environment-name "${{ secrets.EB_ENVIRONMENT_NAME }}" \
          --option-settings '[
            {
              "Namespace": "aws:elasticbeanstalk:application:environment",
              "OptionName": "LINZ_API_KEY",
              "Value": "'"${{ secrets.LINZ_API_KEY }}"'"
            },
            {
              "Namespace": "aws:elasticbeanstalk:application:environment",
              "OptionName": "VALID_API_KEYS",
              "Value": "'"${{ secrets.VALID_API_KEYS }}"'"
            },
            {
              "Namespace": "aws:elasticbeanstalk:application:environment",
              "OptionName": "ADMIN_PASSWORD",
              "Value": "'"${{ secrets.ADMIN_PASSWORD }}"'"
            }
          ]'
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    - name: Wait for environment to be Ready
      run: |
        echo "Waiting for environment to reach Ready state..."
        for i in $(seq 1 30); do
          STATUS=$(aws elasticbeanstalk describe-environments \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-names "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --query "Environments[0].Status" \
            --output text)
          echo "Current status: $STATUS"
          if [ "$STATUS" = "Ready" ]; then
            echo "✅ Environment is Ready"
            exit 0
          fi
          echo "Still updating, retrying in 20 seconds... ($i/30)"
          sleep 20
        done
        echo "❌ Timed out waiting for environment to become Ready"
        exit 1
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        
    
    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: ${{ secrets.EB_APPLICATION_NAME }}
        environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
        version_label: ${{ github.sha }}
        region: ${{ secrets.AWS_REGION }}
        deployment_package: AddressVerifier/build/libs/AddressVerifier.jar
        use_existing_version_if_available: true
    
    - name: Deployment Success
      run: |
        echo "✅ Application deployed successfully!"
        echo "Version: ${{ github.sha }}"
